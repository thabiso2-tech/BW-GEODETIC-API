version: '3.8'

services:
  backend:
    build: ./backend
    container_name: bw-geodetic-backend-dev
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=BotswanaGeodeticEngine
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
    volumes:
      - ./backend:/app
      - /app/__pycache__
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__
            - .pytest_cache
    networks:
      - geodetic-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: bw-geodetic-frontend-dev
    ports:
      - "8501:8501"
    environment:
      - ENVIRONMENT=development
    volumes:
      - ./frontend:/app
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
    depends_on:
      - backend
    networks:
      - geodetic-network
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0

networks:
  geodetic-network:
    driver: bridge
